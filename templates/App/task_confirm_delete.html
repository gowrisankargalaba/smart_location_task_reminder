{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card card-custom p-4 border-danger border-top border-4">
            <h3 class="text-danger mb-3"><i class="fa-solid fa-triangle-exclamation"></i> Delete Task</h3>
            <p>Are you sure you want to delete the task <strong>"{{ task.title }}"</strong>?</p>
            <form method="post" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4 ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
